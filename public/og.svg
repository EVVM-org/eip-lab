<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0033"/>
      <stop offset="1" stop-color="#0a0014"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff006e"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#00f5ff"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.15"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Vaporwave horizon -->
  <rect x="0" y="380" width="1200" height="2" fill="#a855f7" opacity="0.6"/>
  <rect x="0" y="430" width="1200" height="2" fill="#ff006e" opacity="0.5"/>
  <rect x="0" y="480" width="1200" height="2" fill="#00f5ff" opacity="0.4"/>

  <!-- Title -->
  <text x="80" y="220" font-family="'Courier New', monospace" font-weight="700"
        font-size="120" fill="url(#title)" filter="url(#glow)">EIPLab</text>

  <!-- Subtitle -->
  <text x="84" y="290" font-family="'Courier New', monospace" font-size="36"
        fill="#f0e7ff">Prototype EIPs on EVVM in afternoons.</text>

  <!-- Status pill -->
  <rect x="80" y="330" width="280" height="40" rx="2"
        fill="#00ff4115" stroke="#00ff41" stroke-width="1"/>
  <circle cx="100" cy="350" r="4" fill="#00ff41"/>
  <text x="115" y="356" font-family="'Courier New', monospace" font-size="18"
        fill="#00ff41" letter-spacing="3">ONLINE · DEMO · v0.1</text>

  <!-- Terminal prompt -->
  <text x="80" y="540" font-family="'Courier New', monospace" font-size="22"
        fill="#ff006e">$</text>
  <text x="110" y="540" font-family="'Courier New', monospace" font-size="22"
        fill="#f0e7ff">npx tsx new-experiment.ts 8250 "Keyed Nonces"</text>

  <!-- Cursor -->
  <rect x="80" y="565" width="14" height="22" fill="#00ff41"/>
</svg>
